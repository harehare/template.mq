name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: harehare/setup-mq@25dd7cb844804420bcf785503ea4ca54e7fb729c # v1
        with:
          bins: test
      - name: Run tests
        run: mq-test template_tests.mq
